specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: First Data (Fiserv)
providerId: first-data
publisherName: Fiserv, Inc.
serviceCategory: Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - Merchant Services
  - Financial Services
  - Transaction Processing
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps mapping for First Data / Fiserv merchant APIs — take-rate (merchant discount) plus per-transaction and monthly platform fees billed via the merchant services agreement.
notes: Fiserv does not publish public pricing or invoice schemas. Meters below model the expected merchant invoice line items (interchange + assessments + processor markup, gateway fees, monthly platform fees) but exact fee structure varies per merchant agreement.
sources:
  - https://developer.fiserv.com/
  - https://www.fiserv.com/
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies by acquirer/region)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: First Data (Fiserv)
  ServiceCategory: Payments
  ProviderName: Fiserv, Inc.
  PublisherName: Fiserv, Inc.
  InvoiceIssuerName: Fiserv, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: card_transactions
    description: Card-present and card-not-present transactions processed via Commerce Hub / Carat / legacy First Data gateways
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - mcc
      - country
      - channel
      - merchant_id
  - name: transaction_volume
    description: Gross transaction value (used for percentage-based discount-rate calculations)
    unit: USD
    aggregation: sum
    dimensions:
      - card_brand
      - country
      - merchant_id
  - name: gateway_fees
    description: Per-authorization, per-batch, and gateway fees
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant_id
      - product_line
  - name: monthly_platform_fees
    description: Recurring platform, PCI, statement, and value-add service fees
    unit: month
    aggregation: sum
    dimensions:
      - merchant_id
      - product_line
  - name: chargebacks_refunds
    description: Chargebacks, retrieval requests, and refund-related fees
    unit: event
    aggregation: sum
    dimensions:
      - card_brand
      - reason_code
      - merchant_id
principles:
  - name: Visibility
    description: Reconcile Fiserv merchant statements, Clover/Carat reporting exports, and Commerce Hub Reporting APIs against your gateway logs to attribute interchange + processor markup to product lines.
  - name: Allocation
    description: Use the merchant_id, MCC, and channel dimensions to allocate spend to business units; tag Commerce Hub idempotency Client-Request-Ids with internal cost-center identifiers for downstream attribution.
  - name: Optimization
    description: Optimize interchange via Level II/III data and tokenization, route by lowest-cost network where supported, and consolidate MIDs to qualify for volume tiers in your merchant agreement.
  - name: Accountability
    description: Assign merchant-services contract ownership to a single finance/treasury owner; review chargeback ratios monthly and renegotiate the merchant agreement on an annual cadence.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
