aid: first-data
name: First Data (Fiserv)
description: >-
  First Data was a global payment technology solutions company providing
  merchant transaction processing, financial institution services, and prepaid
  services before merging with Fiserv in 2019. Legacy First Data API products
  including Payeezy, Bolt, and Commerce Hub are now part of the Fiserv
  developer portal.
